name = "flickreels-clone"
main = "worker.ts"
compatibility_date = "2024-03-29"

# Konfigurasi frontend assets 
[assets]
directory = "./dist"
binding = "ASSETS"

# Simpan data user dan setting di Cloudflare KV
[[kv_namespaces]]
binding = "DATA_KV"
id = "GANTI_DENGAN_KV_NASESPACE_ID_ANDA"

# Simpan upload file QR di Cloudflare R2
[[r2_buckets]]
binding = "QR_BUCKET"
bucket_name = "flickreels-bucket"

[vars]
# Optional, buka R2 agar bisa diakses public:
# R2_PUBLIC_URL = "https://pub-<id>.r2.dev"
